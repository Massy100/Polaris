services:
  - type: web
    name: polaris-backend
    runtime: image
    repo: https://github.com/Massy100/Polaris
    plan: free
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: DOPPLER_TOKEN
        sync: false

  - type: web
    name: polaris-frontend
    runtime: image
    repo: https://github.com/Massy100/Polaris
    plan: free
    dockerfilePath: ./frontend/Dockerfile
    envVars:
      - key: DOPPLER_TOKEN
        sync: false