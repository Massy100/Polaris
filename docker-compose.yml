version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: polaris_db
    restart: always
    environment:
      POSTGRES_DB: polaris_db
      POSTGRES_USER: polaris_user
      POSTGRES_PASSWORD: polaris_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polaris_user -d polaris_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - polaris_network

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: polaris_backend
    restart: always
    command: >
      sh -c "
        python manage.py migrate &&
        python manage.py runserver 0.0.0.0:8000
      "
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://neondb_owner:npg_w0JPZ2QDIBNA@ep-royal-leaf-a8xax2zw-pooler.eastus2.azure.neon.tech/polaris_db?sslmode=require&channel_binding=require
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      CSRF_TRUSTED_ORIGINS: http://localhost:3000
      DEBUG: 'True'
    depends_on:
      db:
        condition: service_healthy
    networks:
      - polaris_network

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: polaris_frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=1000
      - NEXT_TELEMETRY_DISABLED=1
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend
    networks:
      - polaris_network

  adminer:
    image: adminer:latest
    container_name: polaris_adminer
    restart: always
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      - db
    networks:
      - polaris_network

networks:
  polaris_network:
    driver: bridge

volumes:
  postgres_data: