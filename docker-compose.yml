services:
  db:
    image: postgres:15-alpine
    container_name: polaris_db
    environment:
      POSTGRES_DB: polaris_db
      POSTGRES_USER: polaris_user
      POSTGRES_PASSWORD: polaris_password
    ports:
      - "5432:5432"
    networks:
      - polaris_network

  backend:
    image: python:3.11-slim
    container_name: polaris_backend
    ports:
      - "8000:8000"
    working_dir: /app/backend
    command: >
      sh -c "
      pip install --no-cache-dir django djangorestframework django-cors-headers psycopg2-binary &&
      python manage.py runserver 0.0.0.0:8000
      "
    volumes:
      - ./backend:/app/backend
    environment:
      POSTGRES_DB: polaris_db
      POSTGRES_USER: polaris_user
      POSTGRES_PASSWORD: polaris_password
      POSTGRES_HOST: db
    depends_on:
      - db
    networks:
      - polaris_network

  frontend:
    image: node:18-alpine
    container_name: polaris_frontend
    ports:
      - "3000:3000"
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./frontend:/app/frontend
    networks:
      - polaris_network

networks:
  polaris_network: