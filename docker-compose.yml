version: '3.8'

services:
  # Database PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: polaris_db
    environment:
      POSTGRES_DB: polaris_db
      POSTGRES_USER: polaris_user
      POSTGRES_PASSWORD: polaris_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polaris_user"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - polaris_network

  # Backend Django
  backend:
    build: ./backend
    container_name: polaris_backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: polaris_core.settings
      POSTGRES_HOST: db
      POSTGRES_DB: polaris_db
      POSTGRES_USER: polaris_user
      POSTGRES_PASSWORD: polaris_password
    depends_on:
      db:
        condition: service_healthy
    networks:
      - polaris_network

  # Frontend Next.js
  frontend:
    build: 
      context: ./frontend
    container_name: polaris_frontend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - polaris_network

  # Database administration tool (Adminer)
  adminer:
    image: adminer
    container_name: polaris_adminer
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - polaris_network

networks:
  polaris_network:
    driver: bridge

volumes:
  postgres_data: